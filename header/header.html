<!-- ═══════════════════════════════════════════════════
     HEADER COMPONENT – Kanban Task Manager
     Premium glassmorphism header with logo, nav & auth
═══════════════════════════════════════════════════ -->

<header id="site-header" class="fixed top-0 left-0 w-full z-50 transition-all duration-500">
  <!-- Glassmorphism background -->
  <div class="absolute inset-0 bg-white/70 dark:bg-[#030014]/80 backdrop-blur-2xl border-b border-slate-200/50 dark:border-white/5"></div>
  
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 sm:h-18">
      
      <!-- Left: Logo + Brand -->
      <a href="/" class="flex items-center gap-3 group">
        <div class="relative">
          <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-brand-600 via-violet-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-brand-500/25 group-hover:shadow-brand-500/40 transition-all group-hover:scale-105">
            <span class="material-symbols-outlined text-white text-[20px]" style="font-variation-settings:'FILL' 1;">dashboard</span>
          </div>
          <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 rounded-full border-2 border-white dark:border-[#030014]"></div>
        </div>
        <div>
          <h1 class="text-base font-black text-slate-800 dark:text-white tracking-tight leading-none">Kanban</h1>
          <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mt-0.5">Task Manager</p>
        </div>
      </a>

      <!-- Center: Navigation (Desktop) -->
      <nav class="hidden md:flex items-center gap-1 bg-slate-100/60 dark:bg-white/5 rounded-2xl p-1 backdrop-blur-sm">
        <a href="/" class="header-nav-link active">
          <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">home</span>
          Trang chủ
        </a>
        <a href="/pages/dashboard.html" class="header-nav-link">
          <span class="material-symbols-outlined text-[14px]">view_kanban</span>
          Dashboard
        </a>
        <a href="#features" class="header-nav-link">
          <span class="material-symbols-outlined text-[14px]">star</span>
          Tính năng
        </a>
        <a href="#about" class="header-nav-link">
          <span class="material-symbols-outlined text-[14px]">info</span>
          Giới thiệu
        </a>
      </nav>

      <!-- Right: Actions -->
      <div class="flex items-center gap-2.5">
        <!-- Theme Toggle -->
        <button id="header-theme-toggle" class="w-9 h-9 rounded-xl bg-slate-100/80 dark:bg-white/5 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 transition-all hover:scale-105 active:scale-95 border border-slate-200/50 dark:border-white/5" title="Chuyển giao diện">
          <span class="material-symbols-outlined text-[18px] dark:hidden">dark_mode</span>
          <span class="material-symbols-outlined text-[18px] hidden dark:inline">light_mode</span>
        </button>

        <!-- CTA Button -->
        <a href="/pages/dashboard.html" class="hidden sm:inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold text-white bg-gradient-to-r from-brand-600 via-violet-500 to-cyan-500 shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 transition-all hover:scale-105 active:scale-95">
          <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">rocket_launch</span>
          Bắt đầu
        </a>

        <!-- Mobile Menu Toggle -->
        <button id="header-mobile-toggle" class="md:hidden w-9 h-9 rounded-xl bg-slate-100/80 dark:bg-white/5 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-all active:scale-95 border border-slate-200/50 dark:border-white/5">
          <span class="material-symbols-outlined text-[20px] header-menu-icon">menu</span>
          <span class="material-symbols-outlined text-[20px] header-close-icon hidden">close</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div id="header-mobile-menu" class="md:hidden hidden relative">
    <div class="absolute top-0 left-0 w-full bg-white/95 dark:bg-[#030014]/95 backdrop-blur-2xl border-b border-slate-200/50 dark:border-white/5 shadow-2xl">
      <div class="max-w-7xl mx-auto px-4 py-4 space-y-1">
        <a href="/" class="header-mobile-link active">
          <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1;">home</span>
          Trang chủ
        </a>
        <a href="/pages/dashboard.html" class="header-mobile-link">
          <span class="material-symbols-outlined text-[18px]">view_kanban</span>
          Dashboard
        </a>
        <a href="#features" class="header-mobile-link">
          <span class="material-symbols-outlined text-[18px]">star</span>
          Tính năng
        </a>
        <a href="#about" class="header-mobile-link">
          <span class="material-symbols-outlined text-[18px]">info</span>
          Giới thiệu
        </a>
        <div class="pt-2 mt-2 border-t border-slate-200/50 dark:border-white/5">
          <a href="/pages/dashboard.html" class="flex items-center justify-center gap-2 w-full px-5 py-3 rounded-xl text-xs font-bold text-white bg-gradient-to-r from-brand-600 via-violet-500 to-cyan-500 shadow-lg">
            <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">rocket_launch</span>
            Bắt đầu ngay
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Spacer to prevent content from hiding behind fixed header -->
<div class="h-16 sm:h-18"></div>
