<style>
/* 120fps optimized animations */
@keyframes blob-1 {
  0% { transform: translate3d(0, 0, 0) scale(1); }
  33% { transform: translate3d(30px, -50px, 0) scale(1.1); }
  66% { transform: translate3d(-20px, 20px, 0) scale(0.9); }
  100% { transform: translate3d(0, 0, 0) scale(1); }
}
@keyframes blob-2 {
  0% { transform: translate3d(0, 0, 0) scale(1); }
  33% { transform: translate3d(-30px, 50px, 0) scale(1.1); }
  66% { transform: translate3d(20px, -20px, 0) scale(0.9); }
  100% { transform: translate3d(0, 0, 0) scale(1); }
}
@keyframes card-enter {
  from { opacity: 0; transform: translate3d(0, 40px, 0) scale(0.95); }
  to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
}
@keyframes sweep {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes shine {
  0% { transform: translateX(-100%) skewX(-15deg); }
  50%, 100% { transform: translateX(200%) skewX(-15deg); }
}
@keyframes border-spin {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

.aurora-blob-1 {
  animation: blob-1 8s infinite ease-in-out;
  will-change: transform;
}
.aurora-blob-2 {
  animation: blob-2 10s infinite ease-in-out;
  animation-delay: -2s;
  will-change: transform;
}
.aurora-blob-3 {
  animation: blob-1 12s infinite ease-in-out reverse;
  animation-delay: -4s;
  will-change: transform;
}
.animate-card-enter {
  animation: card-enter 1s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
  will-change: transform, opacity;
}
.animate-gradient-btn {
  background-size: 200% auto;
  animation: sweep 4s linear infinite;
}

/* Fix browser autocomplete breaking dark inputs */
input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus, 
input:-webkit-autofill:active {
  -webkit-box-shadow: 0 0 0 30px #09090b inset !important;
  -webkit-text-fill-color: white !important;
  transition: background-color 5000s ease-in-out 0s;
  caret-color: white;
}

/* Glowing border effect on hover card */
.glass-card::before {
  content: "";
  position: absolute;
  inset: -1px;
  background: linear-gradient(180deg, rgba(139,92,246,0.15) 0%, rgba(255,255,255,0) 100%);
  border-radius: inherit;
  z-index: -1;
  pointer-events: none;
}
.dark .glass-card::before {
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
}

/* Apple-style Animated Border */
.card-border-wrap {
  position: relative;
  border-radius: 1.5rem;
  isolation: isolate;
}
.card-border-wrap::after {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: inherit;
  background: conic-gradient(from 0deg at 50% 50%, rgba(139,92,246,0) 0%, rgba(139,92,246,0) 50%, rgba(139,92,246,0.8) 80%, rgba(6,182,212,0.8) 100%);
  animation: border-spin 4s linear infinite;
  z-index: -2;
  opacity: 0;
  transition: opacity 0.5s ease;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  padding: 2px;
}
.card-border-wrap:hover::after {
  opacity: 1;
}

/* Shine effect on button */
.btn-shine::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shine 3s infinite;
  z-index: 1;
  pointer-events: none;
}

/* Physics based input transition */
input, label {
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>

      <svg class="w-4 h-4 fill-current group-hover:scale-110 transition-transform duration-300" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57"/></svg>
      Tiếp tục với GitHub
    </button>

</div>

<!-- Auth Script -->
<script type="module">
  import { initSupabase } from './js/services/supabase.js';
  import { signInWithGitHub, signInWithEmail, signUpWithEmail, onAuthStateChange } from './js/user/auth.js';

  initSupabase();

  onAuthStateChange((_event, session) => {
    if (session) {
      document.querySelector('.glass-card').style.transform = 'scale(0.9)';
      document.querySelector('.glass-card').style.opacity = '0';
      document.querySelector('.glass-card').style.transition = 'all 0.5s ease-in';
      setTimeout(() => { window.location.href = './index.html'; }, 400);
    }
  });

  const formLogin = document.getElementById('form-login');
  const formRegister = document.getElementById('form-register');
  const btnGoToRegister = document.getElementById('go-to-register');
  const btnGoToLogin = document.getElementById('go-to-login');
  const helperText = document.querySelector('p.text-sm.text-slate-500.font-medium, p.text-sm.text-neutral-400.font-medium');

  // Mouse Cursor Glow Tracking
  const cursorGlow = document.getElementById('cursor-glow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.opacity = '1';
    cursorGlow.style.left = e.clientX + 'px';
    cursorGlow.style.top = e.clientY + 'px';
  });
  document.addEventListener('mouseleave', () => cursorGlow.style.opacity = '0');

  // Theme Toggle Logic
  const themeToggleBtn = document.getElementById('theme-toggle');
  themeToggleBtn.addEventListener('click', () => {
    const html = document.documentElement;
    if (html.classList.contains('dark')) {
      html.classList.remove('dark');
      localStorage.theme = 'light';
    } else {
      html.classList.add('dark');
      localStorage.theme = 'dark';
    }
  });

  // Smooth form transition
  function switchForm(hideForm, showForm, title, subTitle) {
    hideForm.style.opacity = '0';
    hideForm.style.transform = 'translateY(10px) scale(0.98)';
    setTimeout(() => {
      hideForm.classList.add('hidden');
      hideForm.style.transform = '';
      
      showForm.classList.remove('hidden');
      showForm.style.opacity = '0';
      showForm.style.transform = 'translateY(10px) scale(0.98)';
      
      helperText.textContent = subTitle;
      
      requestAnimationFrame(() => {
        showForm.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
        showForm.style.opacity = '1';
        showForm.style.transform = 'translateY(0) scale(1)';
      });
    }, 200);
  }

  // Toggle Password Visibility Logic
  document.querySelectorAll('.btn-toggle-password').forEach(btn => {
    btn.addEventListener('click', (e) => {
      // Prevent label tracking focus
      e.preventDefault(); 
      const input = btn.previousElementSibling;
      const icon = btn.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
      }
    });
  });

  btnGoToRegister?.addEventListener('click', (e) => {
    e.preventDefault();
    formLogin.style.transition = 'all 0.2s ease-out';
    switchForm(formLogin, formRegister, "Đăng ký", "Gia nhập gia đình Kanban.");
  });

  btnGoToLogin?.addEventListener('click', (e) => {
    e.preventDefault();
    formRegister.style.transition = 'all 0.2s ease-out';
    switchForm(formRegister, formLogin, "Kanban", "Khởi động luồng công việc tuyệt đỉnh.");
  });

  formLogin?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Đang tải...';
    btn.disabled = true;

    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');
    try {
      await signInWithEmail(email, pass);
    } catch (err) {
      errEl.textContent = err.message || 'Sai email hoặc mật khẩu.';
      errEl.classList.remove('hidden');
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  });

  formRegister?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Đang tải...';
    btn.disabled = true;

    const email = document.getElementById('register-email').value;
    const pass = document.getElementById('register-password').value;
    const pass2 = document.getElementById('register-password-confirm').value;
    const errEl = document.getElementById('register-error');
    const successEl = document.getElementById('register-success');
    errEl.classList.add('hidden');
    successEl.classList.add('hidden');

    if (pass !== pass2) { 
      errEl.textContent = 'Mật khẩu nhập lại không khớp.'; 
      errEl.classList.remove('hidden'); 
      btn.innerHTML = originalText; btn.disabled = false; return; 
    }
    if (pass.length < 6) { 
      errEl.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.'; 
      errEl.classList.remove('hidden'); 
      btn.innerHTML = originalText; btn.disabled = false; return; 
    }

    try {
      await signUpWithEmail(email, pass);
      successEl.textContent = 'Tạo tài khoản thành công! Xác nhận email để tiếp tục.';
      successEl.classList.remove('hidden');
      formRegister.reset();
      btn.innerHTML = originalText;
      btn.disabled = false;
    } catch (err) {
      errEl.textContent = err.message || 'Đăng ký thất bại.';
      errEl.classList.remove('hidden');
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  });

  document.getElementById('btn-overlay-github')?.addEventListener('click', () => {
    document.getElementById('btn-overlay-github').innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Đang kết nối...';
    signInWithGitHub();
  });
</script>

</body>
</html>
